<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мастер-классы — интерактивное расписание</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="hero-top">
        <div class="hero-copy">
          <div class="eyebrow">Интерактивное расписание</div>
          <h1>Мастер-классы</h1>
        </div>
        <div class="hero-logo-wrap">
          <div class="hero-logo-card">
            <img class="hero-logo" src="logo.svg" alt="Строитель будущего" />
          </div>
        </div>
      </div>
      <div class="mini-grid" id="globalStats"></div>
    </section>

    <section class="controls">
      <div class="panel">
        <h2>Выберите день</h2>
        <div class="day-tabs" id="dayTabs"></div>
      </div>
      <div class="panel">
        <h2>Поиск и фильтры</h2>
        <div class="search-wrap">
          <label class="search-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="11" cy="11" r="7"></circle>
              <path d="M20 20l-3.5-3.5"></path>
            </svg>
            <input id="searchInput" type="search" placeholder="Например: мост, экскурсия, ОКО, группа 5" />
          </label>
          <div class="filters" id="kindFilters"></div>
        </div>
      </div>
    </section>

    <section class="main-panel">
      <div class="day-head">
        <div>
          <h2 id="dayTitle"></h2>
          <p id="dayMeta"></p>
        </div>
      </div>
      <div class="timeline" id="timeline"></div>
    </section>
  </div>
  <script src="script.js"></script>
</body>
</html>
